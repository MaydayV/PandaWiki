name: Backend Build and Push (Docker Hub)

on:
  push:
    tags:
      - "v*"
      - "backend-*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, consumer]
    timeout-minutes: 30

    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}

    steps:
      - name: Checkout code (pro)
        if: ${{ secrets.PRO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: true
          token: ${{ secrets.PRO_TOKEN }}

      - name: Checkout code (oss)
        if: ${{ secrets.PRO_TOKEN == '' }}
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: false

      - name: Select Dockerfile
        id: dockerfile
        run: |
          if [ -n "${{ secrets.PRO_TOKEN }}" ]; then
            echo "FILE=./backend/Dockerfile.${{ matrix.service }}.pro" >> "$GITHUB_OUTPUT"
          else
            echo "FILE=./backend/Dockerfile.${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            if [[ $GITHUB_REF == refs/tags/backend-* ]]; then
              echo "VERSION=${GITHUB_REF#refs/tags/backend-}" >> $GITHUB_OUTPUT
            else
              echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            fi
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ${{ steps.dockerfile.outputs.FILE }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          platforms: linux/amd64, linux/arm64
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/pandawiki-${{ matrix.service }}:${{ steps.get_version.outputs.VERSION }}
          build-args: |
            VERSION=${{ steps.get_version.outputs.VERSION }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}
          cache-to: |
            type=gha,scope=${{ matrix.service }},mode=max
